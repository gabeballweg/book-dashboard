<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log a Book</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0f0f;
      --surface:    #1a1a1a;
      --surface2:   #222222;
      --border:     #2c2c2c;
      --text:       #e8e8e8;
      --text-muted: #a7a7a7;
      --highlight:  #e8e8e8;
    }

    body {
      background-color: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 48px 20px 32px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 600;
      color: var(--highlight);
    }

    .header-sub {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    input, select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 12px 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus { border-color: var(--text-muted); }
    select option { background: var(--surface2); }

    input::placeholder { color: #444; }

    /* number input — hide spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    .submit-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 24px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }

    .submit-btn:hover    { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #status-msg { font-size: 0.82rem; color: var(--text-muted); text-align: center; min-height: 20px; }
    #status-msg.success { color: #268a7a; }
    #status-msg.error   { color: #c04444; }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <!-- PASSWORD GATE -->
  <div id="password-gate" style="position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;">
    <p style="font-family:'Inter',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);">Enter Password</p>
    <input type="password" id="password-input" style="background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.95rem;padding:12px 16px;width:280px;outline:none;text-align:center;" placeholder="Password" />
    <p id="password-error" style="font-family:'Inter',sans-serif;font-size:0.75rem;color:#c04444;display:none;">Incorrect password.</p>
  </div>

  <header>
    <h1>Log a Book</h1>
    <p class="header-sub">Add a new entry to your reading log</p>
  </header>

  <main>

    <!-- TITLE -->
    <div class="field">
      <label>Title</label>
      <input type="text" id="field-title" placeholder="e.g. Childhood's End" />
    </div>

    <!-- AUTHOR -->
    <div class="field">
      <label>Author</label>
      <input type="text" id="field-author" placeholder="e.g. Arthur C. Clarke" />
    </div>

    <!-- YEAR + PAGES -->
    <div class="field-row">
      <div class="field">
        <label>Year Published</label>
        <input type="number" id="field-year" placeholder="e.g. 1953" min="1000" max="2099" />
      </div>
      <div class="field">
        <label>Pages</label>
        <input type="number" id="field-pages" placeholder="e.g. 224" min="1" />
      </div>
    </div>

    <!-- GENRE -->
    <div class="field">
      <label>Genre</label>
      <select id="field-genre">
        <option value="" disabled selected>Select a genre</option>
        <optgroup label="Fiction">
          <option>Literary Fiction</option>
          <option>Historical Fiction</option>
          <option>Science Fiction</option>
          <option>Fantasy</option>
          <option>Horror</option>
          <option>Mystery &amp; Thriller</option>
          <option>Crime Fiction</option>
          <option>Romance</option>
          <option>Short Stories &amp; Essays</option>
        </optgroup>
        <optgroup label="Nonfiction">
          <option>Biography &amp; Memoir</option>
          <option>History</option>
          <option>Science &amp; Nature</option>
          <option>Philosophy &amp; Religion</option>
          <option>Politics &amp; Society</option>
          <option>Psychology &amp; Behavior</option>
          <option>Business &amp; Economics</option>
          <option>Self-Help</option>
          <option>Travel &amp; Adventure</option>
          <option>True Crime</option>
        </optgroup>
      </select>
    </div>

    <!-- DATE + SOURCE -->
    <div class="field-row">
      <div class="field">
        <label>Date Finished</label>
        <input type="date" id="field-date" />
      </div>
      <div class="field">
        <label>Source</label>
        <select id="field-source">
          <option value="" disabled selected>Select</option>
          <option>Physical Book (Owned)</option>
          <option>Physical Book (Library)</option>
          <option>Audiobook (Spotify)</option>
          <option>Audiobook (Libby)</option>
        </select>
      </div>
    </div>

    <!-- NEW OR REREAD + RATING -->
    <div class="field-row">
      <div class="field">
        <label>New or Reread</label>
        <select id="field-reread">
          <option value="" disabled selected>Select</option>
          <option value="New">New</option>
          <option value="Reread">Reread</option>
        </select>
      </div>
      <div class="field">
        <label>Rating</label>
        <select id="field-rating">
          <option value="" disabled selected>Select</option>
          <option>1</option><option>2</option><option>3</option>
          <option>4</option><option>5</option><option>6</option>
          <option>7</option><option>8</option><option>9</option>
          <option>10</option>
        </select>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn">Submit Entry</button>
    <div id="status-msg"></div>

  </main>

  <footer>
    <a href="books.html">← Back to Dashboard</a>
  </footer>

<script>
  // ── PASSWORD ─────────────────────────────────────────────
  // TODO: Change to your preferred password
  const PASSWORD = "royalewithcheese";

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('password-input').focus();
    // Pre-fill today's date
    document.getElementById('field-date').value = new Date().toISOString().split('T')[0];
  });

  document.getElementById('password-input').addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    if (this.value === PASSWORD) {
      const gate = document.getElementById('password-gate');
      gate.style.transition = 'opacity 0.3s';
      gate.style.opacity = '0';
      setTimeout(() => { gate.remove(); document.getElementById('field-title').focus(); }, 300);
    } else {
      document.getElementById('password-error').style.display = 'block';
      this.value = '';
      this.focus();
    }
  });

  // ── CONFIG ───────────────────────────────────────────────
  // TODO: Replace with your Books Apps Script URL
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxga07UHpb4ug3CQukFQCqBxbZQIOcZLxKCSswu7mfwHjnqqWCUU8jbSAnjWiQRcqhh/exec";

  // ── SUBMIT ───────────────────────────────────────────────
  document.getElementById('submit-btn').addEventListener('click', async () => {
    const btn    = document.getElementById('submit-btn');
    const status = document.getElementById('status-msg');

    const payload = {
      title:    document.getElementById('field-title').value.trim(),
      author:   document.getElementById('field-author').value.trim(),
      year:     document.getElementById('field-year').value.trim(),
      pages:    document.getElementById('field-pages').value.trim(),
      genre:    document.getElementById('field-genre').value,
      dateRead: document.getElementById('field-date').value,
      source:   document.getElementById('field-source').value,
      reread:   document.getElementById('field-reread').value,
      rating:   document.getElementById('field-rating').value,
    };

    // Validation — title and author are the only truly required fields
    if (!payload.title || !payload.author) {
      status.textContent = 'Title and author are required.';
      status.className = 'error';
      return;
    }
    if (!payload.dateRead || !payload.source || !payload.reread || !payload.rating || !payload.genre) {
      status.textContent = 'Please fill in all fields before submitting.';
      status.className = 'error';
      return;
    }

    btn.disabled = true;
    status.textContent = 'Submitting…';
    status.className = '';

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
        redirect: 'follow',
        mode: 'no-cors'
      });
      status.textContent = '✓ Entry logged successfully.';
      status.className = 'success';
      resetForm();
    } catch(e) {
      status.textContent = 'Something went wrong. Please try again.';
      status.className = 'error';
    }

    btn.disabled = false;
  });

  function resetForm() {
    document.getElementById('field-title').value  = '';
    document.getElementById('field-author').value = '';
    document.getElementById('field-year').value   = '';
    document.getElementById('field-pages').value  = '';
    document.getElementById('field-genre').value  = '';
    document.getElementById('field-date').value   = new Date().toISOString().split('T')[0];
    document.getElementById('field-source').value = '';
    document.getElementById('field-reread').value = '';
    document.getElementById('field-rating').value = '';
    document.getElementById('field-title').focus();
  }
</script>
</body>
</html>
