<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log a Book</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:         #0f0f0f;
      --surface:    #1a1a1a;
      --surface2:   #222222;
      --border:     #2c2c2c;
      --text:       #e8e8e8;
      --text-muted: #a7a7a7;
      --highlight:  #e8e8e8;
    }

    body {
      background-color: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 48px 20px 32px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 600;
      color: var(--highlight);
    }

    .header-sub {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    input, select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 12px 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      border-color: var(--text-muted);
    }

    select option {
      background: var(--surface2);
    }

    /* ── AUTOCOMPLETE ─────────────────────────────────── */
    .autocomplete-wrap {
      position: relative;
    }

    .autocomplete-list {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 4px 4px;
      z-index: 100;
      max-height: 300px;
      overflow-y: auto;
    }

    .autocomplete-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .autocomplete-item:last-child {
      border-bottom: none;
    }

    .autocomplete-item:hover {
      background: var(--surface);
    }

    .autocomplete-title {
      font-size: 0.9rem;
      color: var(--text);
    }

    .autocomplete-author {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    /* ── METADATA PREVIEW ─────────────────────────────── */
    #book-preview {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 20px;
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.8;
    }

    #book-preview strong {
      color: var(--text);
    }

    /* ── SUBMIT ───────────────────────────────────────── */
    .submit-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 24px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }

    .submit-btn:hover {
      opacity: 0.85;
    }

    .submit-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #status-msg {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
      min-height: 20px;
    }

    #status-msg.success { color: #268a7a; }
    #status-msg.error   { color: #c04444; }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--text);
    }

    input[type="date"] {
      min-width: 0;
      max-width: 100%;
      box-sizing: border-box;
    }

    #password-gate input:focus {
      border-color: var(--text-muted);
    }
  </style>
</head>
<body>

  <!-- ── PASSWORD GATE ──────────────────────────────────────── -->
  <div id="password-gate" style="
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
    ">
    <p style="font-family:'Inter',sans-serif; font-size:0.7rem; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--text-muted);">Enter Password</p>
    <input type="password" id="password-input" style="
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 12px 16px;
      width: 280px;
      outline: none;
      text-align: center;
    " placeholder="Password" />
    <p id="password-error" style="font-family:'Inter',sans-serif; font-size:0.75rem; color:#c04444; display:none;">Incorrect password.</p>
  </div>

  <header>
    <h1>Log a Book</h1>
    <p class="header-sub">Add a new entry to your reading log</p>
  </header>

  <main>

    <!-- BOOK SEARCH -->
    <div class="field">
      <label>Book Title</label>
      <div class="autocomplete-wrap">
        <input type="text" id="book-search" placeholder="Search for a book…" autocomplete="off" />
        <div class="autocomplete-list" id="autocomplete-list"></div>
      </div>
    </div>

    <!-- HIDDEN METADATA FIELDS -->
    <input type="hidden" id="field-title" />
    <input type="hidden" id="field-author" />
    <input type="hidden" id="field-year" />
    <input type="hidden" id="field-pages" />
    <input type="hidden" id="field-gb-id" />
    <input type="hidden" id="field-cover-url" />

    <!-- METADATA PREVIEW -->
    <div id="book-preview"></div>

    <!-- GENRE -->
    <div class="field">
      <label>Genre</label>
      <select id="field-genre">
        <option value="" disabled selected>Select a genre</option>
        <optgroup label="Fiction">
          <option>Literary Fiction</option>
          <option>Historical Fiction</option>
          <option>Science Fiction</option>
          <option>Fantasy</option>
          <option>Horror</option>
          <option>Mystery &amp; Thriller</option>
          <option>Crime Fiction</option>
          <option>Romance</option>
          <option>Short Stories &amp; Essays</option>
        </optgroup>
        <optgroup label="Nonfiction">
          <option>Biography &amp; Memoir</option>
          <option>History</option>
          <option>Science &amp; Nature</option>
          <option>Philosophy &amp; Religion</option>
          <option>Politics &amp; Society</option>
          <option>Psychology &amp; Behavior</option>
          <option>Business &amp; Economics</option>
          <option>Self-Help</option>
          <option>Travel &amp; Adventure</option>
          <option>True Crime</option>
        </optgroup>
      </select>
    </div>

    <!-- DATE READ -->
    <div class="field">
      <label>Date Finished</label>
      <input type="date" id="field-date" />
    </div>

    <!-- SOURCE -->
    <div class="field">
      <label>Source</label>
      <select id="field-source">
        <option value="" disabled selected>Select a source</option>
        <option>Physical Book (Owned)</option>
        <option>Physical Book (Library)</option>
        <option>Audiobook (Library)</option>
      </select>
    </div>

    <!-- NEW OR REREAD -->
    <div class="field">
      <label>New or Reread</label>
      <select id="field-reread">
        <option value="" disabled selected>Select one</option>
        <option value="New">New</option>
        <option value="Reread">Reread</option>
      </select>
    </div>

    <!-- RATING -->
    <div class="field">
      <label>Rating</label>
      <select id="field-rating">
        <option value="" disabled selected>Select a rating</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
      </select>
    </div>

    <button class="submit-btn" id="submit-btn" disabled>Submit Entry</button>
    <div id="status-msg"></div>

  </main>

  <footer>
    <a href="books.html">← Back to Dashboard</a>
  </footer>

<script>
  // ── PASSWORD GATE ────────────────────────────────────────
  // TODO: Change this to your preferred password
  const PASSWORD = "royalewithcheese";

  document.getElementById('password-input').addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    if (this.value === PASSWORD) {
      const gate = document.getElementById('password-gate');
      gate.style.transition = 'opacity 0.3s';
      gate.style.opacity = '0';
      setTimeout(() => gate.remove(), 300);
    } else {
      document.getElementById('password-error').style.display = 'block';
      this.value = '';
      this.focus();
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('password-input').focus();
  });

  // ── CONFIG ───────────────────────────────────────────────
  // TODO: Replace this with the URL of your Books Apps Script
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxga07UHpb4ug3CQukFQCqBxbZQIOcZLxKCSswu7mfwHjnqqWCUU8jbSAnjWiQRcqhh/exec";

  // Google Books API 
  const GB_API = "https://www.googleapis.com/books/v1/volumes?key=AIzaSyCf1Fj7Ptbphs22IoIZlpLfxgo03uxhdjg";

  // ── AUTOCOMPLETE (Google Books) ───────────────────────────
  let searchTimeout = null;
  let selectedBook  = null;

  document.getElementById('book-search').addEventListener('input', function () {
    clearTimeout(searchTimeout);
    const query = this.value.trim();
    if (query.length < 2) { hideList(); return; }
    searchTimeout = setTimeout(() => searchBooks(query), 350);
  });

  async function searchBooks(query) {
    try {
      const res = await fetch(`${GB_API}&q=${encodeURIComponent(query)}&maxResults=8&printType=books`);
      const data = await res.json();
      showList(data.items || []);
    } catch (e) {
      console.error('Search error:', e);
    }
  }

  function showList(items) {
    const list = document.getElementById('autocomplete-list');
    list.innerHTML = '';
    if (!items.length) { hideList(); return; }

    items.forEach(item => {
      const info   = item.volumeInfo || {};
      const title  = info.title || 'Unknown Title';
      const author = info.authors ? info.authors[0] : '—';
      const year   = info.publishedDate ? info.publishedDate.slice(0, 4) : '—';

      const el = document.createElement('div');
      el.className = 'autocomplete-item';
      el.innerHTML = `
        <span class="autocomplete-title">${title}</span>
        <span class="autocomplete-author">${author} · ${year}</span>`;
      el.addEventListener('click', () => selectBook(item));
      list.appendChild(el);
    });
    list.style.display = 'block';
  }

  function hideList() {
    document.getElementById('autocomplete-list').style.display = 'none';
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.autocomplete-wrap')) hideList();
  });

  function selectBook(item) {
    hideList();
    const info = item.volumeInfo || {};

    const title    = info.title || '';
    const author   = info.authors ? info.authors.join(', ') : '';
    const year     = info.publishedDate ? info.publishedDate.slice(0, 4) : '';
    const pages    = info.pageCount ? String(info.pageCount) : '';
    const gbId     = item.id || '';
    const coverUrl = info.imageLinks
      ? (info.imageLinks.thumbnail || info.imageLinks.smallThumbnail || '')
      : '';

    document.getElementById('book-search').value   = title;
    document.getElementById('field-title').value   = title;
    document.getElementById('field-author').value  = author;
    document.getElementById('field-year').value    = year;
    document.getElementById('field-pages').value   = pages;
    document.getElementById('field-gb-id').value   = gbId;
    document.getElementById('field-cover-url').value = coverUrl;

    // Show preview
    const preview = document.getElementById('book-preview');
    preview.innerHTML = `
      <strong>${title}</strong>${year ? ' (' + year + ')' : ''}<br>
      Author: ${author || '—'}<br>
      Pages: ${pages || '—'}`;
    preview.style.display = 'block';

    selectedBook = item;
    // Don't enable submit yet — still need genre selected
    checkSubmitReady();
  }

  // Enable submit only when both a book AND genre are chosen
  document.getElementById('field-genre').addEventListener('change', checkSubmitReady);

  function checkSubmitReady() {
    const hasBook  = !!document.getElementById('field-title').value;
    const hasGenre = !!document.getElementById('field-genre').value;
    document.getElementById('submit-btn').disabled = !(hasBook && hasGenre);
  }

  // ── SUBMIT ───────────────────────────────────────────────
  document.getElementById('submit-btn').addEventListener('click', async () => {
    const btn    = document.getElementById('submit-btn');
    const status = document.getElementById('status-msg');

    const payload = {
      title:    document.getElementById('field-title').value,
      author:   document.getElementById('field-author').value,
      year:     document.getElementById('field-year').value,
      genre:    document.getElementById('field-genre').value,
      pages:    document.getElementById('field-pages').value,
      gbId:     document.getElementById('field-gb-id').value,
      coverUrl: document.getElementById('field-cover-url').value,
      dateRead: document.getElementById('field-date').value,
      source:   document.getElementById('field-source').value,
      reread:   document.getElementById('field-reread').value,
      rating:   document.getElementById('field-rating').value,
    };

    if (!payload.dateRead || !payload.source || !payload.reread || !payload.rating) {
      status.textContent = 'Please fill in all fields before submitting.';
      status.className = 'error';
      return;
    }

    btn.disabled = true;
    status.textContent = 'Submitting...';
    status.className = '';

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
        redirect: 'follow',
        mode: 'no-cors'
      });
      status.textContent = '✓ Entry logged successfully.';
      status.className = 'success';
      resetForm();
    } catch (e) {
      status.textContent = 'Something went wrong. Please try again.';
      status.className = 'error';
      btn.disabled = false;
    }
  });

  function resetForm() {
    document.getElementById('book-search').value      = '';
    document.getElementById('field-date').value       = '';
    document.getElementById('field-source').value     = '';
    document.getElementById('field-reread').value     = '';
    document.getElementById('field-rating').value     = '';
    document.getElementById('field-genre').value      = '';
    document.getElementById('book-preview').style.display = 'none';
    document.getElementById('submit-btn').disabled    = true;
    selectedBook = null;
  }
</script>
</body>
</html>
